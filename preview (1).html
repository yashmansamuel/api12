<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaturesi | Neo L1.0 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        @import url('https://fonts.googleapis.com');
        body { background: #020617; font-family: 'Space Grotesk', sans-serif; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-border { border: 1px solid #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        .status-pulse { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-sky-400">Signaturesi <span class="text-white">Portal</span></h1>
                <p class="text-xs text-slate-500 uppercase tracking-widest">Neo L1.0 Engine Management</p>
            </div>
            <div class="flex items-center gap-2 text-sm bg-slate-900 px-4 py-2 rounded-full border border-slate-800">
                <div class="status-pulse"></div>
                <span class="text-emerald-400 font-medium">System Online</span>
            </div>
        </div>

        <!-- Key Input Section -->
        <div id="auth-box" class="glass p-8 rounded-3xl neon-border mb-8 text-center">
            <h2 class="text-xl font-bold mb-4">Access Developer Console</h2>
            <div class="max-w-md mx-auto">
                <input type="password" id="userKey" 
                    class="w-full bg-black/50 border border-slate-700 p-4 rounded-xl text-center mb-4 focus:outline-none focus:border-sky-500 transition"
                    placeholder="Enter your Neo L1.0 API Key">
                <button onclick="fetchAccountDetails()" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-xl font-bold transition shadow-lg shadow-sky-600/20">
                    Check Live Balance
                </button>
            </div>
        </div>

        <!-- Dashboard Stats (Hidden initially) -->
        <div id="stats-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-6 rounded-3xl border-l-4 border-sky-500">
                <p class="text-slate-400 text-sm mb-1">Total Tokens Available</p>
                <h3 id="tokenCount" class="text-4xl font-bold text-white">0</h3>
            </div>
            <div class="glass p-6 rounded-3xl border-l-4 border-emerald-500">
                <p class="text-slate-400 text-sm mb-1">Account Credit Value</p>
                <h3 id="dollarValue" class="text-4xl font-bold text-emerald-400">$0.00</h3>
            </div>
        </div>

        <!-- Technical Details -->
        <div id="info-box" class="hidden glass p-8 rounded-3xl space-y-6">
            <div>
                <h4 class="text-xs font-bold text-slate-500 uppercase mb-2">Endpoint Configuration</h4>
                <div class="bg-black/50 p-4 rounded-xl font-mono text-sm text-sky-400 border border-slate-800">
                    https://api12-pxoi.vercel.app
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                    <p class="text-[10px] text-slate-500 uppercase">Rate Card</p>
                    <p class="font-bold">$1.25 / 1M Tokens</p>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                    <p class="text-[10px] text-slate-500 uppercase">Latency</p>
                    <p class="font-bold text-emerald-400">Ultra-Low (Cerebras)</p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full text-slate-500 hover:text-white text-sm transition">
                <i class="fas fa-sign-out-alt mr-2"></i> Log out and Switch Key
            </button>
        </div>
    </div>

    <script>
        async function fetchAccountDetails() {
            const key = document.getElementById('userKey').value.trim();
            const tokenCount = document.getElementById('tokenCount');
            const dollarValue = document.getElementById('dollarValue');
            const authBox = document.getElementById('auth-box');
            const statsGrid = document.getElementById('stats-grid');
            const infoBox = document.getElementById('info-box');

            if (!key) return alert("Bhai, pehle API key to daal!");

            try {
                // Fetch from your new FastAPI endpoint
                const response = await fetch(`https://api12-pxoi.vercel.app/user/balance?api_key=${key}`);
                const data = await response.json();

                if (response.ok) {
                    // Update Values
                    tokenCount.textContent = data.balance.toLocaleString();
                    
                    // $1.25 per 1M tokens math
                    const calculatedDollars = (data.balance / 1000000) * 1.25;
                    dollarValue.textContent = `$${calculatedDollars.toFixed(2)}`;

                    // Show Dashboard
                    authBox.classList.add('hidden');
                    statsGrid.classList.remove('hidden');
                    infoBox.classList.remove('hidden');
                } else {
                    alert("Error: " + (data.detail || "Invalid Key"));
                }
            } catch (err) {
                alert("Connection failed. Check if CORS is enabled in main.py");
            }
        }
    </script>
</body>
</html>
