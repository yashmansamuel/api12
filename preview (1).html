<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signaturesi | Neo L1.0 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-xl mx-auto glass p-8 rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold text-sky-400 mb-6 text-center">Neo L1.0 Dashboard</h1>
        
        <div id="login-form">
            <input type="password" id="userKey" class="w-full bg-black border border-slate-700 p-4 rounded-xl mb-4 text-center" placeholder="Enter Signaturesi API Key">
            <button onclick="checkBalance()" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-xl font-bold transition">View My Balance</button>
        </div>

        <div id="result" class="hidden mt-6 space-y-4">
            <div class="p-4 bg-slate-900 rounded-xl border border-slate-800">
                <p class="text-xs text-slate-500 uppercase">Available Tokens</p>
                <h2 id="balance-val" class="text-3xl font-bold text-emerald-400">0</h2>
            </div>
            <div class="p-4 bg-slate-900 rounded-xl border border-slate-800">
                <p class="text-xs text-slate-500 uppercase">Model Status</p>
                <h2 class="text-lg font-bold text-sky-400">Neo L1.0 (Online)</h2>
            </div>
            <button onclick="location.reload()" class="w-full text-slate-500 text-sm">Logout</button>
        </div>
    </div>

    <script>
        async function checkBalance() {
            const key = document.getElementById('userKey').value;
            const res = await fetch(`https://api12-pxoi.vercel.app{key}`);
            const data = await res.json();
            
            if(res.ok) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('balance-val').textContent = data.balance.toLocaleString();
            } else {
                alert("Error: " + (data.detail || "Invalid Key"));
            }
        }
    </script>
</body>
</html>
