<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO L1.0 | Signaturesi Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        @import url('https://fonts.googleapis.com');
        body { background-color: #020617; font-family: 'Space Grotesk', sans-serif; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-glow { text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8; color: #38bdf8; }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold tracking-tighter mb-2">NEO <span class="neon-glow">L1.0</span></h1>
            <p class="text-slate-500 uppercase tracking-[0.5em] text-xs">Signaturesi Intelligence System</p>
        </div>

        <div id="login-section" class="glass p-10 rounded-[2.5rem] text-center max-w-md mx-auto">
            <h2 class="text-2xl font-bold mb-8">Authentication</h2>
            <input type="password" id="userKey" class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl text-center mb-6 focus:border-sky-500 outline-none text-sky-300 font-mono" placeholder="sig-live-xxxxxxxxxxxx">
            <button onclick="authSystem()" class="btn-glow w-full bg-sky-600 py-5 rounded-2xl font-bold uppercase tracking-widest transition-all">Connect Neural Link</button>
        </div>

        <div id="dash-section" class="hidden space-y-8 animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-[2rem] border-l-4 border-sky-500">
                    <span class="text-slate-400 text-sm font-bold uppercase">Token Reserves</span>
                    <h2 id="tokenText" class="text-5xl font-bold my-4">0</h2>
                    <p id="valText" class="text-emerald-400 font-bold">$0.00 Credits</p>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <h4 class="text-slate-500 text-sm font-bold uppercase mb-6">Status</h4>
                    <p>Engine: <b>Neo L1.0</b></p>
                    <p>Latency: <b class="text-emerald-400"> < 0.05ms</b></p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-slate-500 text-sm italic">Log out from Signaturesi</button>
        </div>
    </div>

    <script>
        async function authSystem() {
            const key = document.getElementById('userKey').value.trim();
            try {
                const response = await fetch(`https://api12-pxoi.vercel.app{key}`);
                const data = await response.json();
                if(response.ok) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('dash-section').classList.remove('hidden');
                    document.getElementById('tokenText').textContent = data.balance.toLocaleString();
                    document.getElementById('valText').textContent = `$${((data.balance / 1000000) * 1.25).toFixed(2)} Credits`;
                } else { alert("Key Error: " + data.detail); }
            } catch (err) { alert("Network Error: Make sure CORS is enabled."); }
        }
    </script>
</body>
</html>
