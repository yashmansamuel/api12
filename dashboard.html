<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signaturesi | Neo L1.0 Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full glass p-10 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-bold text-sky-400 mb-2">Neo L1.0</h1>
        <p class="text-slate-500 mb-8 text-sm uppercase">Developer Dashboard</p>
        
        <div id="login-area">
            <input type="password" id="userKey" class="w-full bg-black border border-slate-700 p-4 rounded-xl mb-4 text-center" placeholder="Enter API Key">
            <button onclick="checkBal()" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-xl font-bold transition">Check Balance</button>
        </div>

        <div id="stats-area" class="hidden space-y-6">
            <div class="p-6 bg-slate-900 rounded-2xl border border-slate-800">
                <p class="text-xs text-slate-500 mb-1">LIVE BALANCE</p>
                <h2 id="bal-text" class="text-4xl font-bold text-emerald-400">0</h2>
            </div>
            <button onclick="location.reload()" class="text-slate-500 text-xs">Sign Out</button>
        </div>
    </div>

    <script>
        async function checkBal() {
            const key = document.getElementById('userKey').value;
            const res = await fetch(`https://api12-pxoi.vercel.app{key}`);
            const data = await res.json();
            if(res.ok) {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('stats-area').classList.remove('hidden');
                document.getElementById('bal-text').textContent = data.balance.toLocaleString() + " Tokens";
            } else {
                alert("Invalid Key!");
            }
        }
    </script>
</body>
</html>
